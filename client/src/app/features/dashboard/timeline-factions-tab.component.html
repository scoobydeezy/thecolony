<div class="tab-controls">
  <select [value]="selectedMetric()" (change)="selectedMetric.set($any($event.target).value)">
    @for (m of metrics; track m.value) {
      <option [value]="m.value">{{ m.label }}</option>
    }
  </select>

</div>
<div class="chart-wrap">
  <canvas baseChart
    type="line"
    [data]="chartData()"
    [options]="chartOptions()">
  </canvas>
  @if (markerTooltip(); as tip) {
    <div class="marker-tooltip" [class.flip]="tip.flip" [style.left.px]="tip.x" [style.top.px]="tip.y">
      @for (line of tip.lines; track line) {
        <div>{{ line }}</div>
      }
    </div>
  }
</div>
