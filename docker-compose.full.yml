services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - colony-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__Default=Data Source=/app/data/colony.db
    restart: unless-stopped

  ui:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - API_URL=http://api:5000
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  colony-data:
